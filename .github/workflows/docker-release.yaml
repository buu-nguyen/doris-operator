name: Docker Release

on:
  issue_comment:
    types: [created]

jobs:
  docker-release:
    runs-on: go-latest
    if: ${{ github.event.issue.title == 'Actions Run' && startsWith(github.event.comment.body, '!actions run docker-release') }}
    steps:
      - name: Extract branch
        id: extract-branch
        run: |
          COMMENT_BODY="${{ github.event.comment.body }}"
          BRANCH=$(echo "$COMMENT_BODY" | awk '{print $4}')
          if [ -z "$BRANCH" ]; then
            FOLDER_NAME="main"
          fi
          echo "::set-output name=branch::$BRANCH"
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ steps.extract-branch.outputs.branch }}
          fetch-depth: 0
      - name: Ingest CI secrets
        uses: Infisical/secrets-action@v1.0.7
        with:
          client-id: ${{ secrets.MACHINE_IDENTITY_CLIENT_ID }}
          client-secret: ${{ secrets.MACHINE_IDENTITY_CLIENT_SECRET }}
          env-slug: "prod"
          project-slug: "homelab-058-n"
          secret-path: "/ci"
      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.DOCKER_REGISTRY }}
          username: ${{ env.DOCKER_USERNAME }}
          password: ${{ env.DOCKER_PASSWORD }}
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          config-inline: |
            [registry."${{ env.DOCKER_REGISTRY }}"]
              http = true
              insecure = true
      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          push: true
          tags: "${{ env.DOCKER_REGISTRY }}/${{ github.repository_owner }}/doris-operator:latest"
